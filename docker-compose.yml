version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: intellicredit
      POSTGRES_PASSWORD: intellicredit
      POSTGRES_DB: intellicredit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellicredit"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://intellicredit:intellicredit@db:5432/intellicredit
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
